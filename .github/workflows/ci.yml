name: SNIL CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Sakinisha (install)
        run: npm ci
      - name: Aina (type-check)
        run: npx tsc --noEmit -p tsconfig.json
      - name: Majaribio (test)
        run: npm test
      - name: Jenga (build)
        run: npm run build
